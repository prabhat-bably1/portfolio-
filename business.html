<!DOCTYPE html>
<html>
<head>
<title>Business Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:sans-serif;
}

/* HERO */
.hero{
    padding:60px;
    text-align:center;
    background:#f5f5f5;
}
.hero h1{
    font-size:30px;
}
.btn{
    padding:10px 20px;
    background:#00c853;
    border:none;
    border-radius:5px;
    color:white;
}

/* SECTION */
.section{
    padding:30px;
    text-align:center;
}

/* CARDS */
.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}
.card{
    background:#fff;
    padding:20px;
    margin:10px;
    border-radius:10px;
    width:250px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="hero">
<h1>Grow Your Business 🚀</h1>
<p>We help your business go online</p>
<button class="btn">Get Started</button>
</div>

<div class="section">
<h2>Our Services</h2>

<div class="cards">
<div class="card">
<h3>Website Design</h3>
<p>Modern & responsive design</p>
</div>

<div class="card">
<h3>SEO</h3>
<p>Rank your business on Google</p>
</div>

<div class="card">
<h3>Marketing</h3>
<p>Grow your customers</p>
</div>
</div>
</div>

<div class="section">
<h2>Contact</h2>
<p>📞 9876543210</p>
<p>📧 business@gmail.com</p>
</div>

</body>
</html>
