<!DOCTYPE html>
<html>
<head>
<title>Luxury Salon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#111;
    color:white;
}

/* HERO */
.hero{
    height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
    url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9');
    background-size:cover;
    text-align:center;
}
.hero h1{
    font-size:40px;
}
.btn{
    padding:10px 20px;
    background:#ff4d6d;
    border:none;
    border-radius:5px;
    color:white;
}

/* SECTION */
.section{
    padding:40px;
    text-align:center;
}

/* CARDS */
.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}
.card{
    background:#1e1e1e;
    padding:20px;
    margin:10px;
    border-radius:10px;
    width:250px;
}
</style>
</head>

<body>

<div class="hero">
<h1>Luxury Beauty Salon 💇</h1>
<p>Feel the premium beauty experience</p>
<button class="btn">Book Now</button>
</div>

<div class="section">
<h2>Our Services</h2>

<div class="cards">
<div class="card">
<h3>Hair Styling</h3>
<p>Trendy & modern styles</p>
</div>

<div class="card">
<h3>Makeup</h3>
<p>Professional bridal makeup</p>
</div>

<div class="card">
<h3>Spa</h3>
<p>Relax & refresh</p>
</div>
</div>
</div>

<div class="section">
<h2>Pricing</h2>
<p>Starting from ₹499</p>
</div>

</body>
</html>
